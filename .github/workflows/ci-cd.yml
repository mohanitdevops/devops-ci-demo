name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege by default; individual jobs escalate only what they need
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------
  # 1. Lint + unit test. Runs on GitHub-hosted, ephemeral runners.
  #    Large orgs keep build/test on ephemeral compute so a compromised
  #    dependency can't persist state between runs.
  # ---------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Unit tests + coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ---------------------------------------------------------------------
  # 2. Security scanning: SAST (CodeQL) + dependency vulnerabilities.
  #    Runs in parallel with lint-and-test to keep pipeline fast.
  # ---------------------------------------------------------------------
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high
        continue-on-error: true # flip to false once the dep tree is clean; kept non-blocking for demo

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # ---------------------------------------------------------------------
  # 3. Build the app, build+scan the container image, push to GHCR.
  #    Still on hosted runners — image provenance stays inside GitHub's
  #    infrastructure, not on a developer machine or the deploy target.
  # ---------------------------------------------------------------------
  build-and-push:
    needs: [lint-and-test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # needed for keyless cosign signing
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (loaded locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          build-args: |
            BUILD_SHA=${{ steps.meta.outputs.tag }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.72.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          format: table
          severity: CRITICAL
#          severity: CRITICAL,HIGH          
          exit-code: '1' # pipeline fails the build on critical/high CVEs

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_SHA=${{ steps.meta.outputs.tag }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, OIDC)
        run: cosign sign --yes ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}

  # ---------------------------------------------------------------------
  # 4. Deploy. This is the ONE stage that needs to run on your
  #    self-hosted WSL runner, because that's the actual deploy target.
  #    Gated behind an "environment" so it can require manual approval,
  #    same as production gates at larger orgs.
  # ---------------------------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Deploy via docker compose
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: docker compose up -d --remove-orphans

      - name: Smoke test
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app to come up... ($i/10)"
            sleep 3
          done
          echo "Smoke test failed" >&2
          exit 1

      - name: Roll back on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back to previous 'latest' image"
          docker pull ${{ env.IMAGE_NAME }}:latest
          IMAGE_TAG=latest docker compose up -d --remove-orphans
